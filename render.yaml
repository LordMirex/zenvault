services:
  - type: web
    name: zenvault
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 12h
      - key: PENDING_TOKEN_TTL
        value: 10m
      - key: DATABASE_URL
        fromDatabase:
          name: zenvault-db
          property: connectionString

databases:
  - name: zenvault-db
    plan: free
